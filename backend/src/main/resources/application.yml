server:
  port: 8080

spring:
  application:
    name: chat-server
  # 数据库切换：本地测试用 mysql，验证无误后改为 postgres 即可（对应 application-{profile}.yml）
  profiles:
    active: mysql
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
      username: root
      password: root
  flyway:
    enabled: true
    # {vendor} 由当前数据库自动解析为 mysql / postgresql，加载对应目录下的迁移脚本
    locations: classpath:db/migration/{vendor}
    baseline-on-migrate: true

mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.jin.chat.domain.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: true
      logic-not-delete-value: false

# 业务自定义配置
chat:
  jwt:
    secret: chat-server-jwt-secret-key-please-change-in-prod-0123456789
    # 令牌有效期已收敛到全局配置表（system_config: jwt.expire-minutes），默认 120 分钟
  audit:
    # 以下仅为启动兜底；运行时以 system_config 表为准（修改后立即生效）
    max-wait-seconds: 30
    scan-interval-ms: 5000

# Actuator 监控端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.jin.chat: info
    com.jin.chat.mapper: debug
